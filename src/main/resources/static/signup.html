<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Daily Water Tracker</title>

    <link rel="stylesheet"
          href="css/signup.css">

</head>

<body>

<div class="background">

<div class="card">

<h1>💧</h1>

<h2>Daily Water Tracker</h2>

<p>Stay Hydrated. Stay Healthy.</p>

<form id="signupForm">

<input
        type="email"
        id="email"
        placeholder="Email"
        required>

<input
        type="password"
        id="password"
        placeholder="Password"
        required>

<input
	    type="password"
	    id="confirmPassword"
	    placeholder="Confirm Password"
	    required>	


<button type="submit">

Create Account

</button>

</form>

<p class="login-link">

Already have an account?

<a href="login.html">

Login

</a>

</p>

<div id="message"></div>

</div>

</div>

<script src="js/api.js"></script>

<script src="js/signup.js"></script>

</body>

</html>
