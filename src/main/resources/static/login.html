<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | Daily Water Tracker</title>

    <link rel="stylesheet"
          href="css/login.css">

</head>

<body>

<div class="container">

    <div class="glass">

        <h1>💧</h1>

        <h2>Welcome Back</h2>

        <p>Track your daily hydration journey.</p>

        <form id="loginForm">

            <input
                    type="email"
                    id="email"
                    placeholder="Email"
                    required>

            <div class="password-box">

                <input
                        type="password"
                        id="password"
                        placeholder="Password"
                        required>

                <span id="togglePassword">👁</span>

            </div>

            <button type="submit">

                Login

            </button>

        </form>

        <p>

            Don't have an account?

            <a href="signup.html">

                Register

            </a>

        </p>

        <div id="message"></div>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/login.js"></script>

</body>

</html>
