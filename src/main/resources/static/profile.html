<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Profile</title>

<link rel="stylesheet"
href="css/profile.css">

</head>

<body>

<div class="layout">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">

            💧 Water Tracker

        </div>

        <ul>

            <li onclick="location.href='dashboard.html'">

                Dashboard

            </li>

            <li onclick="location.href='history.html'">

                History

            </li>

            <li onclick="location.href='compare.html'">

                Compare

            </li>

            <li onclick="location.href='reminder.html'">

                Reminder

            </li>

            <li class="active">

                Profile

            </li>

            <li onclick="logout()">

                Logout

            </li>

        </ul>

    </aside>


    <!-- Main -->

    <main class="content">

        <div class="profile-card">

            <h1>

                👤 My Profile

            </h1>

            <p>

                Manage your account settings

            </p>

            <label>

                Full Name

            </label>

            <input
                    id="name"
                    type="text">

            <label>

                Daily Goal (ml)

            </label>

            <input
                    id="dailyGoal"
                    type="number">

            <label>

                Reminder Time

            </label>

            <input
                    id="reminderTime"
                    type="time">

            <button
                    onclick="saveProfile()">

                Save Changes

            </button>

        </div>

    </main>

</div>

<script src="js/api.js"></script>

<script src="js/profile.js"></script>

</body>

</html>
