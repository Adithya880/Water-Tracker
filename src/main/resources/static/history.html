<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>History</title>

<link rel="stylesheet"
href="css/history.css">

</head>

<body>

<div class="layout">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">

            💧 Water Tracker

        </div>

        <ul>

            <li onclick="location.href='dashboard.html'">

                Dashboard

            </li>

            <li class="active">

                History

            </li>

            <li onclick="location.href='compare.html'">

                Compare

            </li>

            <li onclick="location.href='reminder.html'">

                Reminder

            </li>

            <li onclick="location.href='profile.html'">

                Profile

            </li>

            <li onclick="logout()">

                Logout

            </li>

        </ul>

    </aside>


    <main class="content">

        <div class="header">

            <h1>

                Water Intake History

            </h1>

        </div>

        <div class="table-card">

            <table>

                <thead>

                <tr>

                    <th>Date</th>

                    <th>Time</th>

                    <th>Quantity</th>

                    <th>Unit</th>

                    <th>Action</th>

                </tr>

                </thead>

                <tbody id="historyBody">

                </tbody>

            </table>

        </div>

        <div class="pagination">

            <button onclick="previousPage()">

                ◀ Previous

            </button>

            <span id="pageNumber">

                1

            </span>

            <button onclick="nextPage()">

                Next ▶

            </button>

        </div>

    </main>

</div>

<script src="js/api.js"></script>

<script src="js/history.js"></script>

</body>

</html>
